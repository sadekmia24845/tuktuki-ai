<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Tuktuki AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐦</text></svg>" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-logo">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="url(#grad)"/>
            <defs>
              <linearGradient id="grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7C5CFF"/>
                <stop offset="1" stop-color="#00D9C0"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">Tuktuki <span class="brand-ai">AI</span></span>
      </div>
      <button class="icon-btn close-sidebar-btn" id="closeSidebarBtn" aria-label="Close sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <div class="sidebar-section-label">Recent Chats</div>
    <div class="history-list" id="historyList"></div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar user-avatar-small">U</div>
        <div class="user-chip-info">
          <div class="user-chip-name">Guest User</div>
          <div class="user-chip-sub">Free Plan</div>
        </div>
      </div>
      <button class="icon-btn" id="clearAllBtn" title="Clear all chats">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Open sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">New Chat</div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeToggleBtn" title="Toggle theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <div class="chat-wrapper" id="chatWrapper">
      <div class="chat-container" id="chatContainer">

        <div class="empty-state" id="emptyState">
          <div class="empty-logo">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="url(#grad2)"/>
              <defs>
                <linearGradient id="grad2" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#7C5CFF"/>
                  <stop offset="1" stop-color="#00D9C0"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>Hi, I'm Tuktuki AI</h1>
          <p>Ask me anything — code, ideas, writing, or just a chat.</p>

          <div class="suggestions" id="suggestions">
            <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
              <span class="sug-title">Explain a concept</span>
              <span class="sug-sub">quantum computing in simple terms</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a JavaScript function to debounce user input">
              <span class="sug-title">Write some code</span>
              <span class="sug-sub">a debounce function in JavaScript</span>
            </button>
            <button class="suggestion-card" data-prompt="Give me 5 creative startup ideas for 2026">
              <span class="sug-title">Brainstorm ideas</span>
              <span class="sug-sub">5 creative startup ideas for 2026</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a short, warm birthday message for a friend">
              <span class="sug-title">Help me write</span>
              <span class="sug-sub">a warm birthday message</span>
            </button>
          </div>
        </div>

        <div class="messages" id="messages"></div>

      </div>
    </div>

    <div class="composer-area">
      <div class="composer">
        <textarea
          id="promptInput"
          class="composer-input"
          placeholder="Message Tuktuki AI..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="composer-hint">Enter to send • Shift + Enter for new line</div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="script.js"></script>
</body>
</html>
